# BTC助记词破解工具配置文件

# 助记词长度（支持: 12/15/18/21/24）
mnemonic_size: 12

# 密码列表（可选）
# 空数组 [] 表示不使用密码
# 示例: ["mypass", "password123"]
passwords: []

# 目标BTC地址（Legacy格式，以1开头）
target_address: "1KddEkd2fiWuibkSmK1ASBpjpTDjmAZTKs"

# 每位助记词的候选词列表
# 空数组 [] 表示使用全部2048个BIP39单词
# 配置示例: ["abandon", "ability", "able", "about"]
word_positions:
  word0: []   # 第1位助记词候选列表
  word1: []   # 第2位助记词候选列表
  word2: []   # 第3位助记词候选列表
  word3: []   # 第4位助记词候选列表
  word4: []   # 第5位助记词候选列表
  word5: []   # 第6位助记词候选列表
  word6: []   # 第7位助记词候选列表
  word7: []   # 第8位助记词候选列表
  word8: []   # 第9位助记词候选列表
  word9: []   # 第10位助记词候选列表
  word10: []  # 第11位助记词候选列表
  word11: []  # 第12位助记词候选列表（会被校验位过滤）

# 说明：
# 1. 根据猜谜线索配置高概率的候选词
# 2. 不确定的位置留空 []，将使用全部2048个单词
# 3. 最后一位(word11)会被BIP39校验位自动过滤，减少93.75%计算量
# 4. 总搜索空间 = 各位置候选词数量的乘积
