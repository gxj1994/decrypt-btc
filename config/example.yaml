# BTC助记词破解工具配置文件

# 助记词长度（支持: 12/15/18/21/24）
mnemonic_size: 12

# 密码列表（可选）
# 空数组 [] 表示不使用密码
# 示例: ["mypass", "password123"]
passwords: ["123456789"]

# 目标BTC地址（Legacy格式，以1开头）
# tennis endless there vote hawk derive remind mandate couch okay gate grief
target_address: "1CmoB5NoXyXJX8dSVBkeRazK8Eq5LT27gN"

# 每位助记词的候选词列表
# 空数组 [] 表示使用全部2048个BIP39单词
# 配置示例: ["kind", "tennis", "able", "endless"]
word_positions:
  word0: ["tennis"]   # 第1位助记词候选列表
  word1: ["endless"]   # 第2位助记词候选列表
  word2: ["there"]   # 第3位助记词候选列表
  word3: []         # 第4位助记词候选列表
  word4: ["hawk"]   # 第5位助记词候选列表
  word5: ["derive"]   # 第6位助记词候选列表
  word6: ["remind"]   # 第7位助记词候选列表
  word7: ["mandate"]   # 第8位助记词候选列表
  word8: ["couch"]   # 第9位助记词候选列表
  word9: ["okay"]   # 第10位助记词候选列表
  word10: ["gate"]  # 第11位助记词候选列表
  word11: ["grief"]  # 第12位助记词候选列表（会被校验位过滤）

# 说明：
# 1. 根据猜谜线索配置高概率的候选词
# 2. 不确定的位置留空 []，将使用全部2048个单词
# 3. 最后一位(word11)会被BIP39校验位自动过滤，减少93.75%计算量
# 4. 总搜索空间 = 各位置候选词数量的乘积
#
# 搜索空间限制：
# - 默认限制: 5,000,000 (5百万) 次遍历
# - 超过限制程序会报错并退出
# - 可通过命令行参数调整: --max-search-space 10000000
# - 示例: decrypt-btc --gpu --max-search-space 10000000

