name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────── 代码检查 ───────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 安装 OpenCL 依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ocl-icd-opencl-dev \
            opencl-c-headers \
            pkg-config \
            libssl-dev

      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2

      - name: 代码格式化检查
        run: cargo fmt --all --check

      - name: Clippy 静态分析
        run: cargo clippy --all-targets -- -D warnings

  # ─────────────────────────────── 编译 + 单元测试 ───────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 OpenCL 运行时
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ocl-icd-opencl-dev \
            opencl-c-headers \
            pkg-config \
            libssl-dev

      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2

      - name: 编译（debug）
        run: cargo build --all-targets

      - name: 运行单元测试（GPU 测试默认跳过）
        run: cargo test --lib -- --nocapture

      - name: 运行纯逻辑集成测试
        run: cargo test --test test_config_empty_array -- --nocapture

      - name: 编译（release）
        run: cargo build --release

      - name: 验证 Release 产物
        run: |
          BIN="target/release/decrypt-btc"
          test -f "$BIN" && echo "✓ 二进制文件存在"
          file "$BIN" | grep -q "ELF" && echo "✓ 二进制格式正确"
          $BIN --help > /dev/null 2>&1 && echo "✓ 二进制可执行"

      - name: 测试打包结构完整性
        run: |
          PKG_DIR="/tmp/pkg-verify"
          mkdir -p "$PKG_DIR"
          cp target/release/decrypt-btc "$PKG_DIR/"
          cp -r config "$PKG_DIR/"
          cp -r data "$PKG_DIR/"
          cp README.md "$PKG_DIR/"
          # 验证必需文件
          for f in decrypt-btc config/example.yaml data/english.txt README.md; do
            test -f "$PKG_DIR/$f" && echo "✓ $f" || (echo "✗ 缺少 $f"; exit 1)
          done
          echo "✓ 打包结构验证通过"

  # ─────────────────────────────── macOS 编译 ───────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2

      - name: 编译（release）
        run: cargo build --release

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: decrypt-btc-macos
          path: target/release/decrypt-btc
          retention-days: 7
          if-no-files-found: error

  # ─────────────────────────────── Windows 编译（已禁用） ──────────────────────
  # Windows 暂不支持：OpenCL (ocl crate) 在 Windows 环境存在兼容性问题。
  # 如需启用，请安装 OpenCL SDK 后取消注释以下步骤。
  # build-windows:
  #   name: Build (Windows)
  #   runs-on: windows-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: Swatinem/rust-cache@v2
  #     - run: cargo build --release
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: decrypt-btc-windows
  #         path: target/release/decrypt-btc.exe
  #         retention-days: 7
  #         if-no-files-found: error
